name: Publish MCP Registry

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download MCP Publisher
        env:
          GH_TOKEN: ${{ github.token }}
          MCP_PUBLISHER_VERSION: "1.7.9"
        run: |
          gh release download "v${MCP_PUBLISHER_VERSION}" \
            --repo modelcontextprotocol/registry \
            --pattern mcp-publisher_linux_amd64.tar.gz \
            --dir "$RUNNER_TEMP"
          tar -xzf "$RUNNER_TEMP/mcp-publisher_linux_amd64.tar.gz" \
            -C "$RUNNER_TEMP" mcp-publisher
      - name: Validate registry metadata
        run: "$RUNNER_TEMP/mcp-publisher validate"
      - name: Authenticate with GitHub OIDC
        run: "$RUNNER_TEMP/mcp-publisher login github-oidc"
      - name: Publish registry metadata
        run: "$RUNNER_TEMP/mcp-publisher publish"
